<script>

const urlParams = new URLSearchParams(window.location.search);
const recipeId = urlParams.get("recipe");

/* Storage keys */
const KEY_RECIPES = 'rcp_recipes';
const KEY_CATS = 'rcp_categories';

/* Safe read/write helpers */
const read = (k, fallback) => {
  try {
    const raw = localStorage.getItem(k);
    if (!raw) return fallback;
    const parsed = JSON.parse(raw);
    return parsed === null ? fallback : parsed;
  } catch (e) { return fallback; }
};
const write = (k, v) => localStorage.setItem(k, JSON.stringify(v));

let recipe = {
  id: null,
  name: "",
  ingredients: []
};

function collectIngredients() {
  const items = [];

  document.querySelectorAll("#ings .ing-row").forEach(row => {
    const name = row.querySelector(".ing-name")?.value.trim() || "";
    const qty  = row.querySelector(".ing-qty")?.value.trim() || "";
    const unit = row.querySelector(".ing-unit")?.value.trim() || "";
    const prep = row.querySelector(".ing-prep")?.value.trim() || "";

    if (name.length > 0) {
      items.push({ name, qty, unit, prep });
    }
  });

  return items;
}

function saveRecipe(recipe) {

  // Collect ingredients from editor
  recipe.ingredients = collectIngredientsFromEditor();

  // Ensure recipe has an ID
  if (!recipe.id) {
    recipe.id = "r_" + Math.random().toString(36).slice(2,10);
  }

  // Load existing recipes
  let recipes = read(KEY_RECIPES, []);

  // Remove old version if exists
  recipes = recipes.filter(r => r.id !== recipe.id);
  
  // Read modal fields
recipe.name = document.getElementById("rName").value;
recipe.category = document.getElementById("rCategorySelect").value;

// Collect directions
recipe.directions = collectDirectionsFromEditor();

// Collect notes
recipe.notes = collectNotesFromEditor();

  // Add updated recipe
  recipes.push(recipe);

  // Save back to storage
  write(KEY_RECIPES, recipes);

  console.log("Saved recipe:", recipe);

  // Toast (simple)
  alert("Recipe saved");

  // Close modal (correct for your app)
  modal.classList.remove('open');
  modal.setAttribute('aria-hidden','true');
  modalMask.style.display='none';
}

/* Color helper and normalization */
const DEFAULT_COLORS = ['#0b74de','#e07a5f','#2a9d8f','#9b5de5','#f2c94c','#f48fb1','#6c757d'];

function colorForName(name){
  const s = String(name || 'Uncategorized');
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
  return DEFAULT_COLORS[h % DEFAULT_COLORS.length];
}

function normalizeCategories(raw){
  const map = new Map();
  if (!Array.isArray(raw)) return [];

  raw.forEach(item => {
    if (!item) return;

    const name = (typeof item === 'string' ? item : item.name) || 'Uncategorized';
    if (!name) return;

    if (!map.has(name)) {
      const color =
        (typeof item === 'object' && item.color)
          ? item.color
          : colorForName(name);

      map.set(name, { name, color });
    }
  });

  return Array.from(map.values());
}

function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* Elements */
const root = document.getElementById('listRoot');
const listRoot = document.getElementById('listRoot');
const addNew = document.getElementById('addNew');
const addCategory = document.getElementById('addCategory');
const modal = document.getElementById('modal');
const modalMask = document.getElementById('modalMask');
const modalTitle = document.getElementById('modalTitle');
const saveBtn = document.getElementById('saveBtn');
const cancelBtn = document.getElementById('cancelBtn');

const rName = document.getElementById('rName');
const rCategorySelect = document.getElementById('rCategorySelect');
const rId = document.getElementById('rId');
const ings = document.getElementById('ings');
const dirs = document.getElementById('dirs');
const notes = document.getElementById('notes');
const addIng = document.getElementById('btnAddIngredient');
const addDir = document.getElementById('btnAddDirection');
const addNote = document.getElementById('btnAddNote');

document.addEventListener("DOMContentLoaded", () => {
  const addGroupBtn = document.getElementById("btnAddGroup");
  if (addGroupBtn) {
    addGroupBtn.onclick = () => addGroup("");
  }
});

/* Load data and normalize */
let recipes = read(KEY_RECIPES, []);
if (!Array.isArray(recipes)) recipes = [];
let catsRaw = read(KEY_CATS, []);
let categories = normalizeCategories(catsRaw);
recipes.forEach(r => { if (r && r.category && !categories.some(c=>c.name===r.category)) categories.push({ name: r.category, color: colorForName(r.category) }); });
if (categories.length === 0) categories = [{ name: 'Uncategorized', color: colorForName('Uncategorized') }];
write(KEY_CATS, categories);

/* Populate category select */
function populateCategorySelect(){
  const sel = rCategorySelect;
  sel.innerHTML = '';
  const cats = read(KEY_CATS, []) || [];
  const norm = normalizeCategories(cats);
  norm.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.name;
    opt.textContent = c.name;
    opt.dataset.color = c.color || colorForName(c.name);
    sel.appendChild(opt);
  });
}

/* Render categories and recipes */
function render() {

console.log("RENDER VERSION 103");


  // ⭐ Correct root container — no fallbacks ⭐
  const root = document.getElementById('listRoot');
  if (!root) {
    console.error("ERROR: listRoot not found in HTML");
    return;
  }

  // ⭐ Load recipes & categories
  recipes = read(KEY_RECIPES, []) || [];
  let storedCats = read(KEY_CATS, []) || [];

  // ⭐ Normalize category names (trim + lowercase protection)
  storedCats = storedCats.map(c => ({
    ...c,
    name: (c.name || "Uncategorized").trim()
  }));

  // ⭐ Normalize recipe category names
  recipes = recipes.map(r => ({
    ...r,
    category: (r.category || "Uncategorized").trim()
  }));

  // ⭐ Rebuild categories if missing
  if (!storedCats || storedCats.length === 0) {
    const rebuilt = [];
    const seen = new Set();

    recipes.forEach(r => {
      const cat = r.category || "Uncategorized";
      if (!seen.has(cat)) {
        seen.add(cat);
        rebuilt.push({ name: cat, color: colorForName(cat) });
      }
    });

    storedCats = rebuilt;
    write(KEY_CATS, storedCats);
  }

  // ⭐ Ensure categories include all recipe categories
  recipes.forEach(r => {
    if (!storedCats.some(c => c.name === r.category)) {
      storedCats.push({
        name: r.category,
        color: colorForName(r.category)
      });
    }

/* Open editor (uses select for category) */
function openEditorFor(rec){
  const r = rec || { id: "", name: "", ingredients: [], directions: [], notes: [], category: "" };

  rId.value = r ? r.id : '';
  rName.value = r ? r.name : '';

  // Clear sections
  ings.innerHTML = '';
  dirs.innerHTML = '';
  notes.innerHTML = '';

  // Load ingredients (supports old flat format)
  if (Array.isArray(r.ingredients) && r.ingredients.length > 0) {
    // Detect grouped format
    if (r.ingredients[0].items) {
      r.ingredients.forEach(g => {
        const groupEl = addGroup(g.group || "");
        const container = groupEl.querySelector(".group-items");
        g.items.forEach(item => addIngRow(item, container));
      });
    } else {
      // OLD flat format → wrap into one group
      const groupEl = addGroup("");
      const container = groupEl.querySelector(".group-items");
      r.ingredients.forEach(item => addIngRow(item, container));
    }
  } else {
    // No ingredients → create one empty group + row
    const groupEl = addGroup("");
    const container = groupEl.querySelector(".group-items");
    addIngRow({}, container);
  }

  // Load directions
  (r && r.directions || []).forEach(d=>addDirRow(d));
  if(!(r && r.directions && r.directions.length)) addDirRow();

  // Load notes
  (r && r.notes || []).forEach(n => addNoteRow(n));
  if (!(r && r.notes && r.notes.length)) addNoteRow();

  // Title
  modalTitle.textContent = r ? 'Edit Recipe' : 'New Recipe';

  // Category dropdown
  populateCategorySelect();
  const cats = Array.from(rCategorySelect.options).map(o=>o.value);
  const desired = r && r.category ? r.category : (cats[0] || 'Uncategorized');

  if (cats.includes(desired)) {
    rCategorySelect.value = desired;
  } else {
    const newCat = { name: desired, color: colorForName(desired) };
    const stored = normalizeCategories(read(KEY_CATS, []));
    stored.push(newCat);
    write(KEY_CATS, stored);
    populateCategorySelect();
    rCategorySelect.value = desired;
  }

  // Open modal
  currentRecipe = r;
  modal.classList.add('open');
  modal.setAttribute('aria-hidden','false');
  modalMask.classList.add('open');
  modal.style.display = 'block';

  
  document.getElementById("saveBtn").onclick = () => {
  saveRecipe(currentRecipe);
};
  
  // ⭐ SEND TO SHOPPING MANAGER BUTTON
  const sendBtn = document.getElementById("sendToShoppingBtn");
  sendBtn.onclick = () => {
    const recipeId = rId.value;
    console.log("SEND BUTTON CLICKED, ID =", recipeId);
    sendToShopping(recipeId);
  };

  // ⭐ USE AS SHOPPING LIST BUTTON
  const useBtn = document.getElementById("useAsShoppingListBtn");
  useBtn.onclick = () => {
    document.querySelectorAll(".ingredient-check").forEach(cb => cb.checked = true);
    console.log("All ingredients checked for shopping list");
  };
}

/* Import/Export JSON wiring */
(function wireImportExport(){

  // Your HTML already has:
  // <button id="importJsonBtn" class="btn secondary">Import JSON</button>
  // <button id="exportJsonBtn" class="btn secondary">Export JSON</button>

  const importBtn = document.getElementById('importJsonBtn');
  const exportBtn = document.getElementById('exportJsonBtn');

  /* ============================
     EXPORT JSON (unchanged logic)
     ============================ */
  if (exportBtn) {
    exportBtn.addEventListener('click', ()=>{
      const data = {
        recipes: read(KEY_RECIPES, []),
        categories: read(KEY_CATS, []),
        exportedAt: new Date().toISOString()
      };

      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);

      const a = document.createElement('a');
      a.href = url;
      a.download = `recipes-export-${new Date().toISOString().slice(0,19).replace(/[:T]/g,'-')}.json`;

      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    });
  }

  /* ============================
     IMPORT JSON (unchanged logic)
     ============================ */

  // Hidden file input
  const importInput = document.createElement('input');
  importInput.type = 'file';
  importInput.accept = 'application/json';
  importInput.style.display = 'none';

  importInput.addEventListener('change', async (e)=>{
    const f = e.target.files[0];
    if(!f) return;

    try {
      const text = await f.text();
      const parsed = JSON.parse(text);

      const incomingRecipes = Array.isArray(parsed.recipes) ? parsed.recipes : [];
      const incomingCats = Array.isArray(parsed.categories) ? parsed.categories : [];

      /* ============================
         MERGE RECIPES BY ID (SAFE)
         ============================ */
      const existing = read(KEY_RECIPES, []) || [];
      const byId = new Map(existing.map(r => [r.id, r]));

      incomingRecipes.forEach(r => {
        if (!r.id) {
          r.id = 'r' + Date.now() + Math.random().toString(36).slice(2,8);
        }
        const prev = byId.get(r.id);
        if (!prev) {
          byId.set(r.id, r);
        } else {
          if ((r.updated || 0) > (prev.updated || 0)) {
            byId.set(r.id, r);
          }
        }
      });

      const mergedRecipes = Array.from(byId.values());
      write(KEY_RECIPES, mergedRecipes);

      /* ============================================
         MERGE CATEGORIES BY NAME (NO DUPLICATES EVER)
         ============================================ */
      const existingCats = normalizeCategories(read(KEY_CATS, []));
      const incomingCatsNorm = normalizeCategories(incomingCats);

      const mergedCats = [];
      const seen = new Set();

      [...existingCats, ...incomingCatsNorm].forEach(cat => {
        if (!seen.has(cat.name)) {
          seen.add(cat.name);
          mergedCats.push(cat);
        }
      });

      write(KEY_CATS, mergedCats);

      alert(`Imported ${incomingRecipes.length} recipes. Local now has ${mergedRecipes.length} recipes.`);
      render();

    } catch(err) {
      console.error(err);
      alert('Import failed: invalid JSON file.');
    } finally {
      importInput.value = '';
    }
  });

  /* ============================
     WIRE IMPORT BUTTON
     ============================ */
  if (importBtn) {
    importBtn.addEventListener('click', ()=> importInput.click());
  }

  // Add hidden input safely
  document.body.appendChild(importInput);

})();

/* Sortable init (idempotent) */
let _sortable = null;
function initSortableOnce(){
  if(typeof Sortable !== 'function') return;
  try{
    if(_sortable) { _sortable.destroy(); _sortable = null; }
    _sortable = Sortable.create(root, {
      animation:150,
      handle: '.cat-handle',
      onEnd: function(){
        const newOrder = Array.from(root.querySelectorAll('.cat')).map(el => el.dataset.cat);
        const storedCats = normalizeCategories(read(KEY_CATS, []));
        const ordered = newOrder.map(name => {
          const found = storedCats.find(c=>c.name===name);
          return found ? { name: found.name, color: found.color } : { name, color: colorForName(name) };
        });
        write(KEY_CATS, ordered);
        render();
      }
    });
  }catch(e){ console.warn('Sortable init failed', e); }
}

let timerInterval = null;
let timerRemaining = 0;

const overlay = document.getElementById("timerOverlay");
const overlayDisplay = document.getElementById("timerOverlayDisplay");
const overlayClose = document.getElementById("timerOverlayClose");

function startTimer(seconds){
  clearInterval(timerInterval);

  timerRemaining = seconds;
  updateOverlayDisplay();
  overlay.style.display = "flex";

  timerInterval = setInterval(() => {
    timerRemaining--;
    updateOverlayDisplay();

    if (timerRemaining <= 0){
      clearInterval(timerInterval);
      timerRemaining = 0;
      updateOverlayDisplay();
      timerFinished();
    }
  }, 1000);
}

function updateOverlayDisplay(){
  const m = Math.floor(timerRemaining / 60);
  const s = timerRemaining % 60;
  overlayDisplay.textContent = `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
}

function timerFinished(){
  overlayDisplay.textContent = "DONE!";

  if (navigator.vibrate){
    navigator.vibrate([200,100,200]);
  }

  try {
    const beep = new AudioContext();
    const osc = beep.createOscillator();
    osc.type = "sine";
    osc.frequency.value = 880;
    osc.connect(beep.destination);
    osc.start();
    setTimeout(() => osc.stop(), 400);
  } catch(e){}
}

overlayClose.addEventListener("click", () => {
  overlay.style.display = "none";
  clearInterval(timerInterval);
});

    nameInput.className = "recipe-name-input";

    nameInput.addEventListener("change", () => {
      item.name = nameInput.value;   // <-- THIS makes rename save
      saveModel();
    });

    li.appendChild(nameInput);

    // Quantity
    const qtyInput = document.createElement("input");
    qtyInput.type = "text";
    qtyInput.value = item.qty || "";
    qtyInput.className = "recipe-qty-input";
    qtyInput.addEventListener("change", () => {
      item.qty = qtyInput.value;
      saveModel();
    });
    li.appendChild(qtyInput);

    // Unit
    const unitInput = document.createElement("input");
    unitInput.type = "text";
    unitInput.value = item.unit || "";
    unitInput.className = "recipe-unit-input";
    unitInput.addEventListener("change", () => {
      item.unit = unitInput.value;
      saveModel();
    });
    li.appendChild(unitInput);

    // Prep
    const prepInput = document.createElement("input");
    prepInput.type = "text";
    prepInput.value = item.prep || "";
    prepInput.className = "recipe-prep-input";
    prepInput.addEventListener("change", () => {
      item.prep = prepInput.value;
      saveModel();
    });
    li.appendChild(prepInput);

    container.appendChild(li);
  });
}

renderRecipeItems(recipes[0]);

</script>
